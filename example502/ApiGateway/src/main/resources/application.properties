server.port=8900
spring.application.name=api-gateway

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# NOTE:
# For demo/dev stability, route directly to service ports.
# Eureka vẫn chạy để show service discovery, nhưng gateway không phụ thuộc lb:// nữa.

# User service (8811)
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://localhost:8811
spring.cloud.gateway.routes[0].predicates[0]=Path=/accounts/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Catalog service (8810)
spring.cloud.gateway.routes[1].id=product-catalog-service
spring.cloud.gateway.routes[1].uri=http://localhost:8810
spring.cloud.gateway.routes[1].predicates[0]=Path=/catalog/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Order service (8813)
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=http://localhost:8813
spring.cloud.gateway.routes[2].predicates[0]=Path=/shop/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# Recommendation service (8812)
spring.cloud.gateway.routes[3].id=product-recommendation-service
spring.cloud.gateway.routes[3].uri=http://localhost:8812
spring.cloud.gateway.routes[3].predicates[0]=Path=/review/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# Tắt discovery locator động để tránh xung đột route trong môi trường demo
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# CORS configuration
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
